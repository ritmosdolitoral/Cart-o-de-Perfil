<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste IA - Cleber Mantuano</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #BFD1D7 0%, #A8C5CC 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .profile-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: block;
            border: 4px solid #3498db;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .profile-image:hover {
            transform: scale(1.1);
        }
        
        .link-item {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            display: block;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .link-item:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }
        
        /* AI Notification Styles */
        .ai-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            max-width: 300px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: translateX(100%);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        .ai-notification.show {
            transform: translateX(0);
            opacity: 1;
        }
        
        .ai-message {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }
        
        .ai-indicator {
            font-size: 1.2rem;
            animation: aiPulse 2s infinite;
        }
        
        .ai-text {
            color: #333;
            font-weight: 500;
        }
        
        @keyframes aiPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .test-button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 5px;
        }
        
        .test-button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://ugc.production.linktr.ee/77d1d107-304e-40d0-b767-a31cd7aba4b4_WhatsApp-Image-2024-12-19-at-07.36.40.png" 
             alt="Cleber Mantuano" 
             class="profile-image"
             id="profile-image">
        
        <h1>Cleber Mantuano • Profissional</h1>
        <p>Já limpei, atendi, vendi, organizei estoque, instalei internet, fiz site e fui motorista. Trabalho certo, com atenção e sem enrolação.</p>
        
        <a href="#" class="link-item" data-trigger="service_interest">🧰 Serviços que faço</a>
        <a href="#" class="link-item" data-trigger="curriculum_view">📄 Meu perfil profissional</a>
        <a href="#" class="link-item" data-trigger="whatsapp_interest">📞 Falar com Cleber</a>
        
        <div style="margin-top: 20px; text-align: center;">
            <button class="test-button" onclick="testAI()">Testar IA</button>
            <button class="test-button" onclick="testHover()">Testar Hover</button>
        </div>
    </div>

    <script>
        // AI Interactive System - Simplified Version
        class InteractiveAI {
            constructor() {
                this.isActive = false;
                this.responses = {
                    'profile_hover': 'Olá! Vejo que você está interessado em conhecer mais sobre mim. Sou Cleber Mantuano, um profissional versátil e confiável.',
                    'service_interest': 'Interessante! Você parece estar buscando alguém que realmente resolva problemas. Eu entendo que cada trabalho é único.',
                    'contact_consideration': 'Percebo que você está avaliando se vale a pena entrar em contato. Eu não prometo o que não posso cumprir.',
                    'curriculum_view': 'Excelente escolha! O currículo mostra apenas uma parte do que faço. O que importa é a confiança que construo.',
                    'whatsapp_interest': 'Perfeito! Você está no caminho certo. O WhatsApp é o primeiro passo para uma parceria que pode transformar suas necessidades.',
                    'test_message': 'Teste funcionando! A IA está ativa e respondendo às suas interações.'
                };
                this.initializeAI();
            }
            
            initializeAI() {
                this.setupInteractionTriggers();
                console.log('AI System initialized!');
            }
            
            setupInteractionTriggers() {
                // Profile image hover
                const profileImage = document.getElementById('profile-image');
                if (profileImage) {
                    profileImage.addEventListener('mouseenter', () => {
                        console.log('Profile hover detected');
                        this.triggerSubtleResponse('profile_hover');
                    });
                }
                
                // Link hovers
                const links = document.querySelectorAll('.link-item');
                links.forEach(link => {
                    link.addEventListener('mouseenter', () => {
                        const trigger = link.getAttribute('data-trigger');
                        if (trigger) {
                            console.log('Link hover detected:', trigger);
                            this.triggerSubtleResponse(trigger);
                        }
                    });
                });
                
                // Scroll tracking
                let scrollCount = 0;
                window.addEventListener('scroll', () => {
                    scrollCount++;
                    if (scrollCount > 3) {
                        console.log('High engagement detected');
                        this.triggerSubtleResponse('engagement_high');
                        scrollCount = 0;
                    }
                });
            }
            
            triggerSubtleResponse(trigger) {
                if (this.isActive) return;
                
                const response = this.responses[trigger];
                if (response) {
                    this.showSubtleMessage(response);
                }
            }
            
            showSubtleMessage(message) {
                this.isActive = true;
                console.log('Showing message:', message);
                
                // Remove existing notifications
                const existingNotifications = document.querySelectorAll('.ai-notification');
                existingNotifications.forEach(notification => {
                    notification.remove();
                });
                
                // Create notification
                const notification = document.createElement('div');
                notification.className = 'ai-notification';
                notification.innerHTML = `
                    <div class="ai-message">
                        <span class="ai-indicator">💭</span>
                        <span class="ai-text">${message}</span>
                    </div>
                `;
                
                document.body.appendChild(notification);
                
                // Animate in
                setTimeout(() => {
                    notification.classList.add('show');
                }, 100);
                
                // Remove after display
                setTimeout(() => {
                    notification.classList.remove('show');
                    setTimeout(() => {
                        if (notification.parentNode) {
                            notification.parentNode.removeChild(notification);
                        }
                        this.isActive = false;
                    }, 500);
                }, 5000);
            }
        }
        
        // Global functions for testing
        function testAI() {
            if (window.interactiveAI) {
                window.interactiveAI.showSubtleMessage('Teste funcionando! A IA está ativa e respondendo às suas interações.');
            } else {
                alert('AI não está inicializada!');
            }
        }
        
        function testHover() {
            const profileImage = document.getElementById('profile-image');
            if (profileImage) {
                profileImage.dispatchEvent(new Event('mouseenter'));
            }
        }
        
        // Initialize AI when page loads
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing AI...');
            window.interactiveAI = new InteractiveAI();
            
            // Test message after 3 seconds
            setTimeout(() => {
                if (window.interactiveAI) {
                    window.interactiveAI.showSubtleMessage('Bem-vindo! A IA está ativa e pronta para interagir com você.');
                }
            }, 3000);
        });
        
        // Debug logging
        console.log('Script loaded successfully');
    </script>
</body>
</html>
