<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleber Mantuano • Profissional | Conexão Búzios</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #BFD1D7 0%, #A8C5CC 100%);
            color: #030607;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        
        .profile-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: block;
            border: 4px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            transition: all 0.4s ease;
            cursor: pointer;
        }
        
        .profile-image:hover {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        }
        
        .profile-title {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        
        .profile-description {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        
        .link-item {
            background: linear-gradient(135deg, #D6E3E8 0%, #C8DDE3 100%);
            border-radius: 1rem;
            padding: 1.2rem 1.5rem;
            text-decoration: none;
            color: #030607;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin-bottom: 1rem;
            cursor: pointer;
        }
        
        .link-item:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            background: linear-gradient(135deg, #E1F0F5 0%, #D6E3E8 100%);
        }
        
        .link-text {
            flex-grow: 1;
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        /* AI Notification Styles */
        .ai-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            max-width: 300px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: translateX(100%);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        .ai-notification.show {
            transform: translateX(0);
            opacity: 1;
        }
        
        .ai-message {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }
        
        .ai-indicator {
            font-size: 1.2rem;
            animation: aiPulse 2s infinite;
        }
        
        .ai-text {
            color: #030607;
            font-weight: 500;
        }
        
        @keyframes aiPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="container">
        <main class="profile-card">
            <img src="https://ugc.production.linktr.ee/77d1d107-304e-40d0-b767-a31cd7aba4b4_WhatsApp-Image-2024-12-19-at-07.36.40.png" 
                 alt="Foto de perfil de Cleber Mantuano" 
                 class="profile-image"
                 id="profile-image">
            
            <h1 class="profile-title">Cleber Mantuano • Profissional</h1>
            <p class="profile-description">
                Já limpei, atendi, vendi, organizei estoque, instalei internet, fiz site e fui motorista. 
                Trabalho certo, com atenção e sem enrolação.
            </p>
            
            <a href="#" class="link-item" data-trigger="service_interest">
                <span class="link-text">🧰 Serviços que faço</span>
            </a>
            
            <a href="#" class="link-item" data-trigger="curriculum_view">
                <span class="link-text">📄 Meu perfil profissional completo</span>
            </a>
            
            <a href="#" class="link-item" data-trigger="whatsapp_interest">
                <span class="link-text">📞 Falar com Cleber (via recado)</span>
            </a>
            
            <a href="#" class="link-item" data-trigger="contact_consideration">
                <span class="link-text">💡 Projeto Conexão Búzios - por mim</span>
            </a>
        </main>
    </div>

    <script>
        // AI Interactive System
        class InteractiveAI {
            constructor() {
                this.isActive = false;
                this.responses = {
                    'profile_hover': 'Olá! Vejo que você está interessado em conhecer mais sobre mim. Sou Cleber Mantuano, um profissional que já passou por diversas áreas - desde limpeza até desenvolvimento web. Cada experiência me tornou mais versátil e confiável.',
                    'service_interest': 'Interessante! Você parece estar buscando alguém que realmente resolva problemas. Eu não sou apenas mais um profissional - sou alguém que entende que cada trabalho é único e merece atenção especial.',
                    'contact_consideration': 'Percebo que você está avaliando se vale a pena entrar em contato. Deixe-me te contar algo: eu não prometo o que não posso cumprir. Trabalho certo, com atenção e sem enrolação.',
                    'curriculum_view': 'Excelente escolha! O currículo mostra apenas uma parte do que faço. O que realmente importa é a confiança que construo com cada cliente.',
                    'whatsapp_interest': 'Perfeito! Você está no caminho certo. O WhatsApp é só para recado, mas é o primeiro passo para uma parceria que pode transformar suas necessidades em soluções.',
                    'welcome_message': 'Bem-vindo! Vejo que você chegou até aqui. Sou Cleber Mantuano, e cada experiência que tive me tornou mais capaz de resolver problemas reais. Que tal explorar um pouco mais?',
                    'engagement_high': 'Vejo que você está explorando bastante! Isso mostra que você valoriza profissionais que realmente entregam resultados. Cada projeto é uma história de sucesso.'
                };
                this.initializeAI();
            }
            
            initializeAI() {
                console.log('AI System initializing...');
                this.setupInteractionTriggers();
                console.log('AI System initialized successfully!');
            }
            
            setupInteractionTriggers() {
                // Profile image hover
                const profileImage = document.getElementById('profile-image');
                if (profileImage) {
                    profileImage.addEventListener('mouseenter', () => {
                        console.log('Profile hover detected!');
                        this.triggerSubtleResponse('profile_hover');
                    });
                }
                
                // Link hovers
                const links = document.querySelectorAll('.link-item');
                links.forEach(link => {
                    link.addEventListener('mouseenter', () => {
                        const trigger = link.getAttribute('data-trigger');
                        if (trigger) {
                            console.log('Link hover detected:', trigger);
                            this.triggerSubtleResponse(trigger);
                        }
                    });
                });
                
                // Scroll tracking
                let scrollCount = 0;
                window.addEventListener('scroll', () => {
                    scrollCount++;
                    console.log('Scroll detected, count:', scrollCount);
                    if (scrollCount > 3) {
                        this.triggerSubtleResponse('engagement_high');
                        scrollCount = 0;
                    }
                });
                
                // Welcome message after 5 seconds
                setTimeout(() => {
                    this.triggerSubtleResponse('welcome_message');
                }, 5000);
            }
            
            triggerSubtleResponse(trigger) {
                if (this.isActive) return;
                
                const response = this.responses[trigger];
                if (response) {
                    this.showSubtleMessage(response);
                }
            }
            
            showSubtleMessage(message) {
                this.isActive = true;
                console.log('Showing message:', message);
                
                // Remove existing notifications
                const existingNotifications = document.querySelectorAll('.ai-notification');
                existingNotifications.forEach(notification => {
                    notification.remove();
                });
                
                // Create notification
                const notification = document.createElement('div');
                notification.className = 'ai-notification';
                notification.innerHTML = `
                    <div class="ai-message">
                        <span class="ai-indicator">💭</span>
                        <span class="ai-text">${message}</span>
                    </div>
                `;
                
                document.body.appendChild(notification);
                
                // Animate in
                setTimeout(() => {
                    notification.classList.add('show');
                }, 100);
                
                // Remove after display
                setTimeout(() => {
                    notification.classList.remove('show');
                    setTimeout(() => {
                        if (notification.parentNode) {
                            notification.parentNode.removeChild(notification);
                        }
                        this.isActive = false;
                    }, 500);
                }, 5000);
            }
        }
        
        // Initialize everything when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing AI...');
            
            // Initialize AI system
            window.interactiveAI = new InteractiveAI();
            
            console.log('All systems initialized successfully!');
        });
        
        console.log('Script loaded successfully');
    </script>
</body>
</html>
